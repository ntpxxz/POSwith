services:
  postgres:
    image: postgres:16-alpine
    container_name: pos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pos_user
      POSTGRES_PASSWORD: pos_password
      POSTGRES_DB: pos_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pos_user -d pos_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pos_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://pos_user:pos_password@postgres:5432/pos_db
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      NODE_ENV: production
      PORT: 3000
    # No external port — only accessible via nginx
    expose:
      - "3000"
    volumes:
      - uploads_data:/app/uploads

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: pos_nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
  uploads_data:
